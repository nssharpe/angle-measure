<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Angle Measure</title>
<link rel="icon" href="favicon.svg">
<style>
  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --border: #e5e7eb;
    --text: #111827;
    --muted: #6b7280;
    --accent: #4f46e5;
    --accent-hover: #4338ca;
    --danger: #dc2626;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
    -webkit-tap-highlight-color: transparent;
  }

  .app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow);
    z-index: 10;
  }
  header h1 {
    margin: 0; font-size: 16px; font-weight: 600; letter-spacing: -0.01em;
    flex: 0 0 auto;
  }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; }

  button {
    font: inherit;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background .12s, border-color .12s;
    min-height: 36px;
  }
  button:hover { background: #f3f4f6; }
  button.primary { background: var(--accent); color: white; border-color: var(--accent); }
  button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  button.primary.active { background: var(--accent-hover); box-shadow: inset 0 0 0 2px white, inset 0 0 0 3px var(--accent-hover); }
  button.danger { color: var(--danger); border-color: #fecaca; }
  button.danger:hover { background: #fef2f2; }
  button:disabled { opacity: .5; cursor: not-allowed; }

  main { flex: 1; display: flex; min-height: 0; position: relative; }

  .canvas-area {
    flex: 1; position: relative; overflow: hidden;
    background: #f1f5f9;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  .placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 15px;
    pointer-events: none;
    flex-direction: column; gap: 6px;
    padding: 20px;
    text-align: center;
  }
  .placeholder.hidden { display: none; }
  .placeholder strong { color: var(--text); font-weight: 600; font-size: 17px; }

  .stage {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    will-change: transform;
  }
  .stage img { display: block; user-select: none; -webkit-user-drag: none; pointer-events: none; }
  .stage svg {
    position: absolute; top: 0; left: 0;
    overflow: visible;
  }

  .zoom-controls {
    position: absolute; right: 12px; bottom: 12px;
    display: flex; gap: 2px; align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
    box-shadow: var(--shadow);
    z-index: 5;
  }
  .zoom-controls button {
    padding: 4px 10px; min-height: 32px;
    border: none; background: transparent;
    font-size: 16px;
  }
  .zoom-controls button:hover { background: #f3f4f6; }
  .zoom-controls .zoom-label {
    font-variant-numeric: tabular-nums;
    padding: 0 8px; color: var(--muted);
    min-width: 52px; text-align: center;
  }

  .panel {
    width: 280px; flex: 0 0 280px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .panel-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 600; font-size: 12px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .panel-list { flex: 1; overflow-y: auto; padding: 6px; }
  .panel-empty { padding: 24px 16px; color: var(--muted); text-align: center; font-size: 13px; }

  .triplet-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .12s;
  }
  .triplet-row:hover { background: #f3f4f6; }
  .triplet-row.selected { background: #eef2ff; }
  .triplet-swatch {
    width: 12px; height: 12px; border-radius: 50%;
    flex: 0 0 auto;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.08);
  }
  .triplet-label { font-weight: 500; min-width: 28px; }
  .triplet-angle {
    font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums;
    margin-left: auto; padding-right: 4px;
  }
  .triplet-delete {
    border: none; background: transparent;
    color: var(--muted); padding: 4px 8px; min-height: 0;
    border-radius: 4px; font-size: 20px; line-height: 1;
    cursor: pointer;
  }
  .triplet-delete:hover { background: #fee2e2; color: var(--danger); }

  .status {
    position: absolute; left: 50%; top: 12px; transform: translateX(-50%);
    background: var(--accent); color: white;
    padding: 8px 16px; border-radius: 999px;
    font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow);
    z-index: 5;
    display: none;
    white-space: nowrap;
  }
  .status.show { display: block; }

  input[type=file] { display: none; }

  #magnifier {
    position: absolute;
    width: 180px; height: 180px;
    border-radius: 50%;
    border: 3px solid white;
    box-shadow: 0 2px 12px rgba(0,0,0,0.35);
    pointer-events: none;
    display: none;
    z-index: 20;
    transition: left .08s, top .08s;
  }
  #magnifier.visible { display: block; }

  @media (max-width: 720px) {
    header { padding: 8px 10px; gap: 6px; flex-wrap: wrap; }
    header h1 { font-size: 15px; }
    .toolbar { gap: 6px; }
    .toolbar button { padding: 7px 10px; font-size: 13px; min-height: 34px; }
    main { flex-direction: column; }
    .panel { width: 100%; flex: 0 0 auto; max-height: 38vh; border-left: none; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Angle Measure</h1>
    <div class="toolbar">
      <button id="btn-upload">Upload</button>
      <button id="btn-add" class="primary">Add triplet</button>
      <button id="btn-add-pair" class="primary">Add line pair</button>
      <button id="btn-ref-h" disabled title="Snap selected line pair's reference to horizontal">Ref&nbsp;horizontal</button>
      <button id="btn-ref-v" disabled title="Snap selected line pair's reference to vertical">Ref&nbsp;vertical</button>
      <button id="btn-export">Export PNG</button>
      <button id="btn-clear" class="danger">Clear</button>
    </div>
    <input type="file" id="file-input" accept="image/*">
  </header>
  <main>
    <div class="canvas-area" id="canvas-area">
      <div class="placeholder" id="placeholder">
        <strong>Drop, paste, or upload a photo</strong>
        <span>Then add a triplet or a line pair to measure an angle</span>
      </div>
      <div class="stage" id="stage">
        <img id="img" alt="">
        <svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="status" id="status"></div>
      <canvas id="magnifier" width="360" height="360"></canvas>
      <div class="zoom-controls">
        <button id="btn-zoom-out" title="Zoom out">&minus;</button>
        <span class="zoom-label" id="zoom-label">100%</span>
        <button id="btn-zoom-in" title="Zoom in">+</button>
        <button id="btn-zoom-fit" title="Fit to screen">Fit</button>
      </div>
    </div>
    <aside class="panel">
      <div class="panel-header">Measurements</div>
      <div class="panel-list" id="panel-list">
        <div class="panel-empty">No measurements yet</div>
      </div>
    </aside>
  </main>
</div>
<script>
'use strict';

const STORAGE_KEY = 'angle-measure-v1';
const MAX_LONGEST_SIDE = 2000; // px — images larger than this are downscaled on upload
const PALETTE = ['#4f46e5','#dc2626','#16a34a','#ea580c','#9333ea','#0891b2','#db2777','#ca8a04'];
const POINT_R_SCREEN = 11;
const MAG_CANVAS_SIZE = 360;  // canvas resolution (2× the 180px CSS size)
const MAG_CSS_SIZE = 180;
const MAG_WINDOW_IMG = 80;    // image-pixel radius shown in the loupe (full window = 2× this)
const POINT_HIT_R = 20;
const DOT_R_SCREEN = 2.2;
const ARC_R_SCREEN = 32;
const SVG_NS = 'http://www.w3.org/2000/svg';

// Each item is one of:
//   { id, type:'triplet',  color, points:[a, v, b] }
//   { id, type:'linepair', color, ref:[p0, p1], seg:[p0, p1] }
// (legacy saved items without a `type` are treated as triplets)
const state = {
  imageDataUrl: null,
  imgW: 0,
  imgH: 0,
  items: [],
  nextId: 1,
  selected: null,            // { itemId, ptKey }
  viewport: { scale: 1, tx: 0, ty: 0 },
  placeMode: null,           // null | 'triplet' | 'linepair'
  placeBuffer: [],           // clicked points so far
  placeRef: null,            // for 'linepair': the auto reference [p0, p1]
};

/* ---------------- item helpers ---------------- */

function itemKeys(item) {
  return item.type === 'linepair'
    ? ['ref0', 'ref1', 'seg0', 'seg1']
    : ['0', '1', '2'];
}
function getPt(item, key) {
  if (item.type === 'linepair') {
    return key === 'ref0' ? item.ref[0]
         : key === 'ref1' ? item.ref[1]
         : key === 'seg0' ? item.seg[0]
         : item.seg[1];
  }
  return item.points[+key];
}
function setPt(item, key, p) {
  if (item.type === 'linepair') {
    if (key === 'ref0') item.ref[0] = p;
    else if (key === 'ref1') item.ref[1] = p;
    else if (key === 'seg0') item.seg[0] = p;
    else item.seg[1] = p;
  } else {
    item.points[+key] = p;
  }
}
function isVertexKey(item, key) {
  return item.type === 'triplet' && key === '1';
}
function itemLabel(item) {
  return (item.type === 'linepair' ? 'L' : 'T') + item.id;
}
function defaultKey(item) {
  return item.type === 'linepair' ? 'seg1' : '1';
}

function lineDir(seg) {
  return Math.atan2(seg[1].y - seg[0].y, seg[1].x - seg[0].x);
}
function linePairAngleDeg(item) {
  let d = lineDir(item.seg) - lineDir(item.ref);
  while (d > Math.PI) d -= 2 * Math.PI;
  while (d < -Math.PI) d += 2 * Math.PI;
  return Math.abs(d) * 180 / Math.PI;
}
function itemAngleDeg(item) {
  return item.type === 'linepair'
    ? linePairAngleDeg(item)
    : interiorAngle(item) * 180 / Math.PI;
}

// Intersection of infinite lines (p1->p2) and (p3->p4); null if parallel.
function lineIntersection(p1, p2, p3, p4) {
  const d1x = p2.x - p1.x, d1y = p2.y - p1.y;
  const d2x = p4.x - p3.x, d2y = p4.y - p3.y;
  const denom = d1x * d2y - d1y * d2x;
  if (Math.abs(denom) < 1e-9) return null;
  const t = ((p3.x - p1.x) * d2y - (p3.y - p1.y) * d2x) / denom;
  return { x: p1.x + t * d1x, y: p1.y + t * d1y };
}

const $ = id => document.getElementById(id);
const canvasArea = $('canvas-area');
const stage = $('stage');
const img = $('img');
const svg = $('svg');
const placeholder = $('placeholder');
const statusEl = $('status');
const panelList = $('panel-list');
const zoomLabel = $('zoom-label');
const magnifier = $('magnifier');
const magCtx = magnifier.getContext('2d');

/* ---------------- persistence ---------------- */

let saveTimer = null;
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const full = {
      imageDataUrl: state.imageDataUrl,
      imgW: state.imgW,
      imgH: state.imgH,
      items: state.items,
      nextId: state.nextId,
      viewport: state.viewport,
    };
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(full));
    } catch (e) {
      // Image too large for localStorage quota — save without it so measurements survive
      try {
        const slim = { imgW: state.imgW, imgH: state.imgH, items: state.items, nextId: state.nextId, viewport: state.viewport };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(slim));
      } catch (e2) { console.warn('save failed', e2); }
    }
  }, 250);
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const p = JSON.parse(raw);
    if (!p.imageDataUrl) return;
    loadImage(p.imageDataUrl).then(() => {
      // `items` is current; `triplets` is the legacy key
      state.items = (p.items || p.triplets || []).map(it =>
        it.type ? it : { ...it, type: 'triplet' });
      state.nextId = p.nextId || (state.items.length + 1);
      if (p.viewport) {
        state.viewport = p.viewport;
        applyViewport();
      }
      render();
    });
  } catch (e) { console.warn('load failed', e); }
}

/* ---------------- image loading ---------------- */

function loadImage(dataUrl) {
  return new Promise((resolve, reject) => {
    const tmp = new Image();
    tmp.onload = () => {
      state.imageDataUrl = dataUrl;
      state.imgW = tmp.naturalWidth;
      state.imgH = tmp.naturalHeight;
      img.src = dataUrl;
      img.width = tmp.naturalWidth;
      img.height = tmp.naturalHeight;
      svg.setAttribute('width', tmp.naturalWidth);
      svg.setAttribute('height', tmp.naturalHeight);
      svg.setAttribute('viewBox', `0 0 ${tmp.naturalWidth} ${tmp.naturalHeight}`);
      placeholder.classList.add('hidden');
      fitToScreen();
      resolve();
    };
    tmp.onerror = reject;
    tmp.src = dataUrl;
  });
}

function fileToDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function downscaleDataUrl(dataUrl, maxSide) {
  return new Promise(resolve => {
    const tmp = new Image();
    tmp.onload = () => {
      const { naturalWidth: w, naturalHeight: h } = tmp;
      if (Math.max(w, h) <= maxSide) { resolve(dataUrl); return; }
      const scale = maxSide / Math.max(w, h);
      const c = document.createElement('canvas');
      c.width = Math.round(w * scale);
      c.height = Math.round(h * scale);
      c.getContext('2d').drawImage(tmp, 0, 0, c.width, c.height);
      resolve(c.toDataURL('image/jpeg', 0.92));
    };
    tmp.src = dataUrl;
  });
}

async function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const raw = await fileToDataUrl(file);
  const url = await downscaleDataUrl(raw, MAX_LONGEST_SIDE);
  state.items = [];
  state.nextId = 1;
  state.selected = null;
  exitPlaceMode();
  await loadImage(url);
  render();
  save();
}

$('btn-upload').addEventListener('click', () => $('file-input').click());
$('file-input').addEventListener('change', e => {
  const f = e.target.files && e.target.files[0];
  if (f) handleFile(f);
  e.target.value = '';
});

canvasArea.addEventListener('dragover', e => { e.preventDefault(); });
canvasArea.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files && e.dataTransfer.files[0];
  if (f) handleFile(f);
});

window.addEventListener('paste', e => {
  if (!e.clipboardData) return;
  for (const item of e.clipboardData.items) {
    if (item.type && item.type.startsWith('image/')) {
      const f = item.getAsFile();
      if (f) { handleFile(f); break; }
    }
  }
});

/* ---------------- viewport ---------------- */

function updateTransform() {
  const v = state.viewport;
  stage.style.transform = `translate(${v.tx}px, ${v.ty}px) scale(${v.scale})`;
  zoomLabel.textContent = Math.round(v.scale * 100) + '%';
}

function applyViewport() {
  updateTransform();
  render();
}

function fitToScreen() {
  if (!state.imgW) return;
  const r = canvasArea.getBoundingClientRect();
  const s = Math.min(r.width / state.imgW, r.height / state.imgH) * 0.95;
  state.viewport.scale = s;
  state.viewport.tx = (r.width - state.imgW * s) / 2;
  state.viewport.ty = (r.height - state.imgH * s) / 2;
  applyViewport();
}

function screenToImage(sx, sy) {
  const r = canvasArea.getBoundingClientRect();
  const v = state.viewport;
  return {
    x: (sx - r.left - v.tx) / v.scale,
    y: (sy - r.top - v.ty) / v.scale,
  };
}

function zoomAt(sx, sy, factor) {
  const v = state.viewport;
  const newScale = Math.max(0.05, Math.min(40, v.scale * factor));
  const r = canvasArea.getBoundingClientRect();
  const px = sx - r.left, py = sy - r.top;
  v.tx = px - (px - v.tx) * (newScale / v.scale);
  v.ty = py - (py - v.ty) * (newScale / v.scale);
  v.scale = newScale;
  applyViewport();
  save();
}

canvasArea.addEventListener('wheel', e => {
  if (!state.imageDataUrl) return;
  e.preventDefault();
  const factor = Math.exp(-e.deltaY * 0.0015);
  zoomAt(e.clientX, e.clientY, factor);
}, { passive: false });

$('btn-zoom-in').addEventListener('click', () => {
  const r = canvasArea.getBoundingClientRect();
  zoomAt(r.left + r.width/2, r.top + r.height/2, 1.25);
});
$('btn-zoom-out').addEventListener('click', () => {
  const r = canvasArea.getBoundingClientRect();
  zoomAt(r.left + r.width/2, r.top + r.height/2, 0.8);
});
$('btn-zoom-fit').addEventListener('click', fitToScreen);

/* ---------------- measurements ---------------- */

function nextColor() {
  const color = PALETTE[(state.nextId - 1) % PALETTE.length];
  return color;
}
function newTriplet(points) {
  return { id: state.nextId++, type: 'triplet', color: nextColor(), points };
}
function newLinePair(ref, seg) {
  return { id: state.nextId++, type: 'linepair', color: nextColor(), ref, seg };
}

function interiorAngle(t) {
  const [a, v, b] = t.points;
  const v1x = a.x - v.x, v1y = a.y - v.y;
  const v2x = b.x - v.x, v2y = b.y - v.y;
  const l1 = Math.hypot(v1x, v1y), l2 = Math.hypot(v2x, v2y);
  if (l1 < 1e-9 || l2 < 1e-9) return 0;
  const c = (v1x * v2x + v1y * v2y) / (l1 * l2);
  return Math.acos(Math.max(-1, Math.min(1, c)));
}

function getItem(id) { return state.items.find(it => it.id === id); }

function deleteItem(id) {
  state.items = state.items.filter(it => it.id !== id);
  if (state.selected && state.selected.itemId === id) state.selected = null;
  updateRefButtons();
  render(); save();
}

// Build a default vertical reference centred in the current view.
function defaultReference() {
  const r = canvasArea.getBoundingClientRect();
  const c = screenToImage(r.left + r.width / 2, r.top + r.height / 2);
  const cx = Math.max(0, Math.min(state.imgW, c.x));
  const cy = Math.max(0, Math.min(state.imgH, c.y));
  const len = Math.min(state.imgW, state.imgH) * 0.3;
  return [{ x: cx, y: cy + len / 2 }, { x: cx, y: cy - len / 2 }]; // p0 bottom, p1 top
}

// Snap the reference of a line pair to horizontal / vertical, keeping its centre & length.
function setRefOrientation(item, orient) {
  const [a, b] = item.ref;
  const cx = (a.x + b.x) / 2, cy = (a.y + b.y) / 2;
  let len = Math.hypot(b.x - a.x, b.y - a.y);
  if (len < 1e-6) len = Math.min(state.imgW, state.imgH) * 0.3;
  if (orient === 'v') {
    item.ref = [{ x: cx, y: cy + len / 2 }, { x: cx, y: cy - len / 2 }];
  } else {
    item.ref = [{ x: cx - len / 2, y: cy }, { x: cx + len / 2, y: cy }];
  }
}

const selectedLinePair = () => {
  if (!state.selected) return null;
  const it = getItem(state.selected.itemId);
  return it && it.type === 'linepair' ? it : null;
};
function updateRefButtons() {
  const enabled = !!selectedLinePair();
  $('btn-ref-h').disabled = !enabled;
  $('btn-ref-v').disabled = !enabled;
}
$('btn-ref-h').addEventListener('click', () => {
  const it = selectedLinePair(); if (!it) return;
  setRefOrientation(it, 'h'); render(); save();
});
$('btn-ref-v').addEventListener('click', () => {
  const it = selectedLinePair(); if (!it) return;
  setRefOrientation(it, 'v'); render(); save();
});

$('btn-clear').addEventListener('click', () => {
  if (!confirm('Clear image and all measurements?')) return;
  state.imageDataUrl = null;
  state.imgW = state.imgH = 0;
  state.items = [];
  state.nextId = 1;
  state.selected = null;
  exitPlaceMode();
  img.removeAttribute('src');
  placeholder.classList.remove('hidden');
  state.viewport = { scale: 1, tx: 0, ty: 0 };
  applyViewport();
  render();
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
});

/* ---------------- place mode ---------------- */

function startPlaceMode(mode) {
  if (!state.imageDataUrl) { alert('Load an image first.'); return; }
  if (state.placeMode === mode) { exitPlaceMode(); render(); return; }
  exitPlaceMode();
  state.placeMode = mode;
  state.placeBuffer = [];
  state.placeRef = mode === 'linepair' ? defaultReference() : null;
  $(mode === 'linepair' ? 'btn-add-pair' : 'btn-add').classList.add('active');
  canvasArea.style.cursor = 'crosshair';
  updateStatus();
  render();
}

$('btn-add').addEventListener('click', () => startPlaceMode('triplet'));
$('btn-add-pair').addEventListener('click', () => startPlaceMode('linepair'));

function updateStatus() {
  if (!state.placeMode) { statusEl.classList.remove('show'); return; }
  let labels;
  if (state.placeMode === 'triplet') {
    labels = ['Place arm point 1', 'Place vertex (the angle)', 'Place arm point 2'];
  } else {
    labels = ['Place measured segment — start point', 'Place measured segment — end point'];
  }
  statusEl.textContent = labels[state.placeBuffer.length] + ' — Esc to cancel';
  statusEl.classList.add('show');
}

function exitPlaceMode() {
  state.placeMode = null;
  state.placeBuffer = [];
  state.placeRef = null;
  $('btn-add').classList.remove('active');
  $('btn-add-pair').classList.remove('active');
  canvasArea.style.cursor = '';
  updateStatus();
}

window.addEventListener('keydown', e => {
  if (e.key === 'Escape' && state.placeMode) { exitPlaceMode(); render(); return; }
  if (!state.selected) return;
  if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
  const step = e.shiftKey ? 10 : 1;
  let dx = 0, dy = 0;
  if (e.key === 'ArrowLeft') dx = -step;
  else if (e.key === 'ArrowRight') dx = step;
  else if (e.key === 'ArrowUp') dy = -step;
  else if (e.key === 'ArrowDown') dy = step;
  else if (e.key === 'Delete' || e.key === 'Backspace') {
    deleteItem(state.selected.itemId);
    return;
  } else return;
  e.preventDefault();
  const it = getItem(state.selected.itemId);
  if (!it) return;
  const p = getPt(it, state.selected.ptKey);
  p.x = Math.max(0, Math.min(state.imgW, p.x + dx));
  p.y = Math.max(0, Math.min(state.imgH, p.y + dy));
  render(); save();
});

/* ---------------- pointer interaction ---------------- */

const activePointers = new Map();
let dragTarget = null;
let pinchStart = null;

canvasArea.addEventListener('pointerdown', e => {
  if (!state.imageDataUrl) return;
  canvasArea.setPointerCapture(e.pointerId);
  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  // Capture the pointer to prevent native scroll/refresh gestures, but
  // manually fire the button click on release so the button still works.
  const btn = e.target.closest('button');
  if (btn) {
    const startX = e.clientX, startY = e.clientY, pid = e.pointerId;
    const onUp = ev => {
      if (ev.pointerId !== pid) return;
      if (Math.hypot(ev.clientX - startX, ev.clientY - startY) < 12) btn.click();
      canvasArea.removeEventListener('pointerup', onUp);
    };
    canvasArea.addEventListener('pointerup', onUp);
    return;
  }

  if (activePointers.size === 2) {
    const pts = [...activePointers.values()];
    const dx = pts[0].x - pts[1].x, dy = pts[0].y - pts[1].y;
    pinchStart = {
      dist: Math.hypot(dx, dy),
      scale: state.viewport.scale,
    };
    dragTarget = null;
    return;
  }

  const target = e.target.closest && e.target.closest('[data-point]');
  if (target) {
    const itemId = +target.getAttribute('data-item');
    const ptKey = target.getAttribute('data-pt');
    state.selected = { itemId, ptKey };
    dragTarget = { kind: 'point', itemId, ptKey };
    updateRefButtons();
    render();
    return;
  }

  if (state.placeMode) {
    const p = screenToImage(e.clientX, e.clientY);
    if (p.x < 0 || p.y < 0 || p.x > state.imgW || p.y > state.imgH) return;
    state.placeBuffer.push(p);
    const need = state.placeMode === 'triplet' ? 3 : 2;
    if (state.placeBuffer.length === need) {
      const item = state.placeMode === 'triplet'
        ? newTriplet(state.placeBuffer)
        : newLinePair(state.placeRef, state.placeBuffer);
      state.items.push(item);
      state.selected = { itemId: item.id, ptKey: defaultKey(item) };
      exitPlaceMode();
      updateRefButtons();
      save();
    } else {
      updateStatus();
    }
    render();
    return;
  }

  state.selected = null;
  updateRefButtons();
  dragTarget = {
    kind: 'pan',
    startTx: state.viewport.tx, startTy: state.viewport.ty,
    startPx: e.clientX, startPy: e.clientY,
  };
  render();
});

canvasArea.addEventListener('pointermove', e => {
  if (!activePointers.has(e.pointerId)) return;
  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (activePointers.size === 2 && pinchStart) {
    const pts = [...activePointers.values()];
    const dx = pts[0].x - pts[1].x, dy = pts[0].y - pts[1].y;
    const newDist = Math.hypot(dx, dy);
    if (newDist < 1) return;
    const factor = newDist / pinchStart.dist;
    const targetScale = Math.max(0.05, Math.min(40, pinchStart.scale * factor));
    const midX = (pts[0].x + pts[1].x) / 2;
    const midY = (pts[0].y + pts[1].y) / 2;
    const r = canvasArea.getBoundingClientRect();
    const px = midX - r.left, py = midY - r.top;
    const v = state.viewport;
    v.tx = px - (px - v.tx) * (targetScale / v.scale);
    v.ty = py - (py - v.ty) * (targetScale / v.scale);
    v.scale = targetScale;
    updateTransform(); // CSS-only during gesture; render() fires in endPointer
    return;
  }

  if (!dragTarget) return;

  if (dragTarget.kind === 'point') {
    const p = screenToImage(e.clientX, e.clientY);
    const it = getItem(dragTarget.itemId);
    if (!it) return;
    const clampedX = Math.max(0, Math.min(state.imgW, p.x));
    const clampedY = Math.max(0, Math.min(state.imgH, p.y));
    setPt(it, dragTarget.ptKey, { x: clampedX, y: clampedY });
    showMagnifier(clampedX, clampedY, it.color, e.clientX, e.clientY);
    scheduleRender();
  } else if (dragTarget.kind === 'pan') {
    state.viewport.tx = dragTarget.startTx + (e.clientX - dragTarget.startPx);
    state.viewport.ty = dragTarget.startTy + (e.clientY - dragTarget.startPy);
    updateTransform(); // CSS-only during pan; render() fires in endPointer
  }
});

let rafPending = false;
function scheduleRender() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => { rafPending = false; render(); });
}

function endPointer(e) {
  activePointers.delete(e.pointerId);
  if (activePointers.size < 2) pinchStart = null;
  if (activePointers.size === 0) {
    hideMagnifier();
    if (dragTarget) { render(); save(); }
    dragTarget = null;
  }
}
canvasArea.addEventListener('pointerup', endPointer);
canvasArea.addEventListener('pointercancel', endPointer);

/* ---------------- magnifier ---------------- */

function showMagnifier(imgX, imgY, color, screenX, screenY) {
  const areaRect = canvasArea.getBoundingClientRect();
  const margin = 14;

  // Position loupe in the corner furthest from the finger
  const useRight = (screenX - areaRect.left) < areaRect.width / 2;
  const useBottom = (screenY - areaRect.top) < areaRect.height / 2;
  magnifier.style.left = useRight ? (areaRect.width  - MAG_CSS_SIZE - margin) + 'px'
                                  : margin + 'px';
  magnifier.style.top  = useBottom ? (areaRect.height - MAG_CSS_SIZE - margin) + 'px'
                                   : margin + 'px';

  // Source rectangle in image space (clamped to image bounds)
  const half = MAG_WINDOW_IMG;
  const srcX = imgX - half, srcY = imgY - half;
  const srcW = half * 2,    srcH = half * 2;

  magCtx.clearRect(0, 0, MAG_CANVAS_SIZE, MAG_CANVAS_SIZE);

  // Neutral background for areas outside the image
  magCtx.fillStyle = '#e5e7eb';
  magCtx.fillRect(0, 0, MAG_CANVAS_SIZE, MAG_CANVAS_SIZE);

  // Draw image section
  magCtx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, MAG_CANVAS_SIZE, MAG_CANVAS_SIZE);

  // Crosshair
  const cx = MAG_CANVAS_SIZE / 2;
  magCtx.strokeStyle = 'rgba(0,0,0,0.3)';
  magCtx.lineWidth = 1.5;
  magCtx.beginPath();
  magCtx.moveTo(cx, 0); magCtx.lineTo(cx, MAG_CANVAS_SIZE);
  magCtx.moveTo(0, cx); magCtx.lineTo(MAG_CANVAS_SIZE, cx);
  magCtx.stroke();

  // Point ring at centre
  const pr = 13;
  magCtx.strokeStyle = 'white';
  magCtx.lineWidth = 4;
  magCtx.beginPath(); magCtx.arc(cx, cx, pr, 0, Math.PI * 2); magCtx.stroke();
  magCtx.strokeStyle = color;
  magCtx.lineWidth = 2.5;
  magCtx.beginPath(); magCtx.arc(cx, cx, pr, 0, Math.PI * 2); magCtx.stroke();
  magCtx.fillStyle = color;
  magCtx.beginPath(); magCtx.arc(cx, cx, 3.5, 0, Math.PI * 2); magCtx.fill();

  magnifier.classList.add('visible');
}

function hideMagnifier() {
  magnifier.classList.remove('visible');
}

/* ---------------- rendering ---------------- */

function render() {
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  const s = state.viewport.scale || 1;
  const sizes = {
    pointR: POINT_R_SCREEN / s,
    hitR: POINT_HIT_R / s,
    dotR: DOT_R_SCREEN / s,
    arcR: ARC_R_SCREEN / s,
    strokeW: 2 / s,
    armW: 1.8 / s,
    fontSize: 15 / s,
    idFontSize: 11 / s,
    dash: 3 / s,
  };

  for (const it of state.items) {
    if (it.type === 'linepair') drawLinePair(it, sizes);
    else drawTriplet(it, sizes);
  }

  if (state.placeMode) {
    const previewColor = '#6b7280';
    // For a line pair, show the pending auto reference as a dashed line.
    if (state.placeMode === 'linepair' && state.placeRef) {
      svg.appendChild(el('line', {
        x1: state.placeRef[0].x, y1: state.placeRef[0].y,
        x2: state.placeRef[1].x, y2: state.placeRef[1].y,
        stroke: previewColor, 'stroke-width': sizes.armW,
        'stroke-dasharray': `${sizes.dash * 2} ${sizes.dash}`,
      }));
      for (const p of state.placeRef) drawPoint(p, previewColor, sizes, null, null, false, false);
    }
    for (const p of state.placeBuffer) drawPoint(p, previewColor, sizes, null, null, false, false);
    if (state.placeBuffer.length === 2) {
      svg.appendChild(el('line', {
        x1: state.placeBuffer[0].x, y1: state.placeBuffer[0].y,
        x2: state.placeBuffer[1].x, y2: state.placeBuffer[1].y,
        stroke: previewColor, 'stroke-width': sizes.armW,
        'stroke-dasharray': `${sizes.dash} ${sizes.dash * 0.8}`,
      }));
    }
  }

  renderPanel();
}

function el(tag, attrs) {
  const e = document.createElementNS(SVG_NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

function drawTriplet(t, sizes) {
  const [a, v, b] = t.points;
  const color = t.color;

  svg.appendChild(el('line', {
    x1: a.x, y1: a.y, x2: v.x, y2: v.y,
    stroke: color, 'stroke-width': sizes.armW, 'stroke-linecap': 'round',
  }));
  svg.appendChild(el('line', {
    x1: b.x, y1: b.y, x2: v.x, y2: v.y,
    stroke: color, 'stroke-width': sizes.armW, 'stroke-linecap': 'round',
  }));

  const a1 = Math.atan2(a.y - v.y, a.x - v.x);
  const a2 = Math.atan2(b.y - v.y, b.x - v.x);
  let delta = a2 - a1;
  while (delta > Math.PI) delta -= 2 * Math.PI;
  while (delta < -Math.PI) delta += 2 * Math.PI;
  const sweepEnd = a1 + delta;
  const angleDeg = Math.abs(delta) * 180 / Math.PI;

  const arcR = sizes.arcR;
  const sx = v.x + Math.cos(a1) * arcR;
  const sy = v.y + Math.sin(a1) * arcR;
  const ex = v.x + Math.cos(sweepEnd) * arcR;
  const ey = v.y + Math.sin(sweepEnd) * arcR;
  const sweepFlag = delta > 0 ? 1 : 0;

  svg.appendChild(el('path', {
    d: `M ${v.x} ${v.y} L ${sx} ${sy} A ${arcR} ${arcR} 0 0 ${sweepFlag} ${ex} ${ey} Z`,
    fill: color, 'fill-opacity': 0.15,
  }));
  svg.appendChild(el('path', {
    d: `M ${sx} ${sy} A ${arcR} ${arcR} 0 0 ${sweepFlag} ${ex} ${ey}`,
    fill: 'none', stroke: color, 'stroke-width': sizes.armW,
  }));

  const bisector = a1 + delta / 2;
  const labelR = arcR + sizes.fontSize * 1.3;
  const lx = v.x + Math.cos(bisector) * labelR;
  const ly = v.y + Math.sin(bisector) * labelR;
  const label = el('text', {
    x: lx, y: ly,
    'text-anchor': 'middle', 'dominant-baseline': 'middle',
    fill: color, 'font-size': sizes.fontSize,
    'font-weight': 600,
    'paint-order': 'stroke', stroke: 'white',
    'stroke-width': 3 / state.viewport.scale,
    'stroke-linejoin': 'round',
  });
  label.textContent = angleDeg.toFixed(1) + '°';
  svg.appendChild(label);

  const idR = arcR * 1.3;
  const idAngle = bisector + Math.PI;
  const idx = v.x + Math.cos(idAngle) * idR;
  const idy = v.y + Math.sin(idAngle) * idR;
  const idLabel = el('text', {
    x: idx, y: idy,
    'text-anchor': 'middle', 'dominant-baseline': 'middle',
    fill: color, 'font-size': sizes.idFontSize,
    'font-weight': 600,
    'paint-order': 'stroke', stroke: 'white',
    'stroke-width': 2.5 / state.viewport.scale,
    'stroke-linejoin': 'round',
  });
  idLabel.textContent = itemLabel(t);
  svg.appendChild(idLabel);

  for (let i = 0; i < 3; i++) {
    const isVertex = i === 1;
    const key = String(i);
    const selected = state.selected
      && state.selected.itemId === t.id
      && state.selected.ptKey === key;
    drawPoint(t.points[i], color, sizes, t.id, key, isVertex, selected);
  }
}

function drawLinePair(item, sizes) {
  const color = item.color;
  const [r0, r1] = item.ref;
  const [s0, s1] = item.seg;

  // Reference line: dashed.  Measured segment: solid.
  svg.appendChild(el('line', {
    x1: r0.x, y1: r0.y, x2: r1.x, y2: r1.y,
    stroke: color, 'stroke-width': sizes.armW, 'stroke-linecap': 'round',
    'stroke-dasharray': `${sizes.dash * 2.2} ${sizes.dash * 1.4}`,
  }));
  svg.appendChild(el('line', {
    x1: s0.x, y1: s0.y, x2: s1.x, y2: s1.y,
    stroke: color, 'stroke-width': sizes.armW, 'stroke-linecap': 'round',
  }));

  const angleDeg = linePairAngleDeg(item);

  // Draw the angle arc at the intersection of the two lines, between the
  // reference direction and the segment direction.
  const ix = lineIntersection(r0, r1, s0, s1);
  let labelX, labelY;
  if (ix && ix.x > -1e5 && ix.x < state.imgW + 1e5 && ix.y > -1e5 && ix.y < state.imgH + 1e5) {
    const aRef = lineDir(item.ref);
    const aSeg = lineDir(item.seg);
    let delta = aSeg - aRef;
    while (delta > Math.PI) delta -= 2 * Math.PI;
    while (delta < -Math.PI) delta += 2 * Math.PI;
    const arcR = sizes.arcR;
    const sweepEnd = aRef + delta;
    const sx = ix.x + Math.cos(aRef) * arcR;
    const sy = ix.y + Math.sin(aRef) * arcR;
    const ex = ix.x + Math.cos(sweepEnd) * arcR;
    const ey = ix.y + Math.sin(sweepEnd) * arcR;
    const sweepFlag = delta > 0 ? 1 : 0;
    svg.appendChild(el('path', {
      d: `M ${ix.x} ${ix.y} L ${sx} ${sy} A ${arcR} ${arcR} 0 0 ${sweepFlag} ${ex} ${ey} Z`,
      fill: color, 'fill-opacity': 0.15,
    }));
    svg.appendChild(el('path', {
      d: `M ${sx} ${sy} A ${arcR} ${arcR} 0 0 ${sweepFlag} ${ex} ${ey}`,
      fill: 'none', stroke: color, 'stroke-width': sizes.armW,
    }));
    const bisector = aRef + delta / 2;
    const labelR = arcR + sizes.fontSize * 1.3;
    labelX = ix.x + Math.cos(bisector) * labelR;
    labelY = ix.y + Math.sin(bisector) * labelR;
  } else {
    // Parallel lines (or intersection absurdly far): label at segment midpoint.
    labelX = (s0.x + s1.x) / 2;
    labelY = (s0.y + s1.y) / 2 - sizes.fontSize;
  }

  const label = el('text', {
    x: labelX, y: labelY,
    'text-anchor': 'middle', 'dominant-baseline': 'middle',
    fill: color, 'font-size': sizes.fontSize, 'font-weight': 600,
    'paint-order': 'stroke', stroke: 'white',
    'stroke-width': 3 / state.viewport.scale, 'stroke-linejoin': 'round',
  });
  label.textContent = angleDeg.toFixed(1) + '°';
  svg.appendChild(label);

  // Item id near the measured segment's first endpoint.
  const idLabel = el('text', {
    x: s0.x, y: s0.y - sizes.idFontSize * 1.4,
    'text-anchor': 'middle', 'dominant-baseline': 'middle',
    fill: color, 'font-size': sizes.idFontSize, 'font-weight': 600,
    'paint-order': 'stroke', stroke: 'white',
    'stroke-width': 2.5 / state.viewport.scale, 'stroke-linejoin': 'round',
  });
  idLabel.textContent = itemLabel(item);
  svg.appendChild(idLabel);

  for (const key of itemKeys(item)) {
    const selected = state.selected
      && state.selected.itemId === item.id
      && state.selected.ptKey === key;
    drawPoint(getPt(item, key), color, sizes, item.id, key, false, selected);
  }
}

function drawPoint(p, color, sizes, itemId, ptKey, isVertex, selected) {
  const ringStroke = sizes.strokeW * (isVertex ? 1.4 : 1);
  svg.appendChild(el('circle', {
    cx: p.x, cy: p.y, r: sizes.pointR,
    fill: 'none', stroke: 'white', 'stroke-width': ringStroke * 2,
    'pointer-events': 'none',
  }));
  svg.appendChild(el('circle', {
    cx: p.x, cy: p.y, r: sizes.pointR,
    fill: 'none', stroke: color, 'stroke-width': ringStroke,
    'pointer-events': 'none',
  }));
  svg.appendChild(el('circle', {
    cx: p.x, cy: p.y, r: sizes.dotR,
    fill: color, 'pointer-events': 'none',
  }));
  if (selected) {
    svg.appendChild(el('circle', {
      cx: p.x, cy: p.y, r: sizes.pointR * 1.65,
      fill: 'none', stroke: color,
      'stroke-width': sizes.strokeW * 0.9,
      'stroke-dasharray': `${sizes.dash} ${sizes.dash}`,
      'pointer-events': 'none',
    }));
  }
  if (itemId != null) {
    const hit = el('circle', {
      cx: p.x, cy: p.y, r: sizes.hitR,
      fill: 'black', 'fill-opacity': 0.001,
      'data-item': itemId, 'data-pt': ptKey, 'data-point': '',
    });
    hit.style.cursor = 'grab';
    svg.appendChild(hit);
  }
}

function renderPanel() {
  if (state.items.length === 0) {
    panelList.innerHTML = '<div class="panel-empty">No measurements yet</div>';
    return;
  }
  panelList.innerHTML = '';
  for (const it of state.items) {
    const angleDeg = itemAngleDeg(it);
    const isSel = state.selected && state.selected.itemId === it.id;
    const kind = it.type === 'linepair' ? 'line pair' : 'triplet';
    const row = document.createElement('div');
    row.className = 'triplet-row' + (isSel ? ' selected' : '');
    row.innerHTML = `
      <span class="triplet-swatch" style="background:${it.color}"></span>
      <span class="triplet-label">${itemLabel(it)}</span>
      <span class="triplet-angle" style="color:${it.color}">${angleDeg.toFixed(1)}°</span>
      <button class="triplet-delete" title="Delete">&times;</button>
    `;
    row.title = kind;
    row.addEventListener('click', e => {
      if (e.target.classList.contains('triplet-delete')) {
        if (confirm('Delete ' + itemLabel(it) + '?')) deleteItem(it.id);
        return;
      }
      state.selected = { itemId: it.id, ptKey: defaultKey(it) };
      updateRefButtons();
      render();
    });
    panelList.appendChild(row);
  }
}

/* ---------------- export ---------------- */

$('btn-export').addEventListener('click', exportPNG);

function exportPNG() {
  if (!state.imageDataUrl) { alert('Load an image first.'); return; }
  const canvas = document.createElement('canvas');
  canvas.width = state.imgW;
  canvas.height = state.imgH;
  const ctx = canvas.getContext('2d');

  const tmp = new Image();
  tmp.onload = () => {
    ctx.drawImage(tmp, 0, 0);
    const baseUnit = Math.max(state.imgW, state.imgH) / 800;
    const armW = 2 * baseUnit;
    const pointR = 11 * baseUnit;
    const dotR = 2.5 * baseUnit;
    const arcR = 36 * baseUnit;
    const fontPx = 20 * baseUnit;
    const idFontPx = 14 * baseUnit;

    const fontFamily = '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif';

    const drawDot = (p, color, isVertex) => {
      ctx.strokeStyle = 'white'; ctx.lineWidth = armW * 2;
      ctx.beginPath(); ctx.arc(p.x, p.y, pointR, 0, Math.PI * 2); ctx.stroke();
      ctx.strokeStyle = color; ctx.lineWidth = armW * (isVertex ? 1.4 : 1);
      ctx.beginPath(); ctx.arc(p.x, p.y, pointR, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(p.x, p.y, dotR, 0, Math.PI * 2); ctx.fill();
    };
    const drawText = (txt, x, y, color, px) => {
      ctx.font = `600 ${px}px ${fontFamily}`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.lineWidth = px * 0.22; ctx.strokeStyle = 'white';
      ctx.strokeText(txt, x, y);
      ctx.fillStyle = color; ctx.fillText(txt, x, y);
    };
    // Filled + outlined arc spanning `delta` from `a1`, centred at (cx,cy).
    const drawArc = (cx, cy, a1, delta, color) => {
      ctx.fillStyle = color; ctx.globalAlpha = 0.15;
      ctx.beginPath(); ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, arcR, a1, a1 + delta, delta < 0);
      ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1;
      ctx.strokeStyle = color; ctx.lineWidth = armW;
      ctx.beginPath(); ctx.arc(cx, cy, arcR, a1, a1 + delta, delta < 0); ctx.stroke();
    };

    for (const it of state.items) {
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      const color = it.color;

      if (it.type === 'linepair') {
        const [r0, r1] = it.ref, [s0, s1] = it.seg;
        ctx.strokeStyle = color; ctx.lineWidth = armW;
        ctx.setLineDash([armW * 2.2, armW * 1.6]);
        ctx.beginPath(); ctx.moveTo(r0.x, r0.y); ctx.lineTo(r1.x, r1.y); ctx.stroke();
        ctx.setLineDash([]);
        ctx.beginPath(); ctx.moveTo(s0.x, s0.y); ctx.lineTo(s1.x, s1.y); ctx.stroke();

        const aRef = lineDir(it.ref), aSeg = lineDir(it.seg);
        let delta = aSeg - aRef;
        while (delta > Math.PI) delta -= 2 * Math.PI;
        while (delta < -Math.PI) delta += 2 * Math.PI;

        const ix = lineIntersection(r0, r1, s0, s1);
        let lx, ly;
        if (ix) {
          drawArc(ix.x, ix.y, aRef, delta, color);
          const bis = aRef + delta / 2, labelR = arcR + fontPx * 0.9;
          lx = ix.x + Math.cos(bis) * labelR;
          ly = ix.y + Math.sin(bis) * labelR;
        } else {
          lx = (s0.x + s1.x) / 2; ly = (s0.y + s1.y) / 2 - fontPx;
        }
        for (const key of itemKeys(it)) drawDot(getPt(it, key), color, false);
        drawText(linePairAngleDeg(it).toFixed(1) + '°', lx, ly, color, fontPx);
        drawText(itemLabel(it), s0.x, s0.y - idFontPx * 1.4, color, idFontPx);
        continue;
      }

      const [a, v, b] = it.points;
      ctx.strokeStyle = color; ctx.lineWidth = armW;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y); ctx.lineTo(v.x, v.y);
      ctx.moveTo(b.x, b.y); ctx.lineTo(v.x, v.y);
      ctx.stroke();

      const a1 = Math.atan2(a.y - v.y, a.x - v.x);
      const a2 = Math.atan2(b.y - v.y, b.x - v.x);
      let delta = a2 - a1;
      while (delta > Math.PI) delta -= 2 * Math.PI;
      while (delta < -Math.PI) delta += 2 * Math.PI;

      drawArc(v.x, v.y, a1, delta, color);
      for (let i = 0; i < 3; i++) drawDot(it.points[i], color, i === 1);

      const bisector = a1 + delta / 2;
      const labelR = arcR + fontPx * 0.9;
      drawText((Math.abs(delta) * 180 / Math.PI).toFixed(1) + '°',
        v.x + Math.cos(bisector) * labelR, v.y + Math.sin(bisector) * labelR, color, fontPx);

      const idR = arcR * 1.3;
      drawText(itemLabel(it),
        v.x + Math.cos(bisector + Math.PI) * idR, v.y + Math.sin(bisector + Math.PI) * idR, color, idFontPx);
    }

    canvas.toBlob(blob => {
      const d = new Date();
      const pad = n => String(n).padStart(2,'0');
      const filename = `angle-measure-${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}.png`;
      const file = new File([blob], filename, { type: 'image/png' });
      if (window.matchMedia('(pointer: coarse)').matches && navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: 'Angle measurement' }).catch(() => {});
      } else {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.download = filename;
        a.href = url;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }
    }, 'image/png');
  };
  tmp.src = state.imageDataUrl;
}

/* ---------------- resize ---------------- */

let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(render, 80);
});

/* ---------------- boot ---------------- */

load();
render();
</script>
</body>
</html>
